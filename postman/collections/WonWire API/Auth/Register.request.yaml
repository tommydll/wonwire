$kind: http-request
name: Register
method: POST
url: http://localhost:8080/api/auth/register
order: 1000
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "email": "thomas@test.com",
        "password": "testPassword",
        "fullName": "Thomas Test"
    }
description: |-
  Crée un nouvel utilisateur et retourne un JWT token.

  **Réponse attendue (201 Created):**
  ```json
  {
    "token": "<jwt_token>",
    "email": "thomas@wonwire.com",
    "fullName": "Thomas Daullé"
  }
  ```

  **Cas d'erreur à tester :**
  - Email déjà utilisé → 409 Conflict
  - Email invalide → 400 Bad Request
  - Mot de passe < 8 caractères → 400 Bad Request
  - fullName manquant → 400 Bad Request
