services:

  postgres:
    image: postgres:16
    container_name: wonwire-postgres
    environment:
      POSTGRES_DB: wonwire
      POSTGRES_USER: wonwire
      POSTGRES_PASSWORD: wonwire
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wonwire"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: wonwire-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wonwire-backend
    env_file:
      - ./backend/.env.docker
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wonwire-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: