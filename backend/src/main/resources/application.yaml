spring:
  application:
    name: wonwire
  datasource:
    url: jdbc:postgresql://localhost:5432/wonwire
    username: wonwire
    password: wonwire
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

jwt:
  secret: wonwire-secret-key-change-this-in-production-must-be-very-long
  expiration: 86400000