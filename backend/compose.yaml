services:
  postgres:
    image: postgres:16
    container_name: wonwire-postgres
    environment:
      POSTGRES_DB: wonwire
      POSTGRES_USER: wonwire
      POSTGRES_PASSWORD: wonwire
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: wonwire-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: